# CodeBase Agent Configuration

# LLM Settings
llm:
  model: "groq/llama-3.3-70b-versatile"
  temperature: 0.0
  max_tokens: 1024
# Agent Settings
agents:
  analyst:
    max_iter: 2
    enable: true
  developer:
    max_iter: 2
    enable: true
  qa_engineer:
    max_iter: 2
    enable: true

# Crew Settings
crew:
  process: "sequential"  # or "hierarchical"
  memory: false
  max_rpm: 1
  verbose: true

# Processing Settings
processing:
  files:
    - "target_repo/bad_code_1.py"
    - "target_repo/bad_code_2.py"
    - "target_repo/deps_shared.py"
    - "target_repo/deps_a.py"
    - "target_repo/deps_b.py"
  # To process multiple files, add them here:
  # - "target_repo/another_file.py"
  # - "src/module.py"
  
  # Set to "aggressive" for more refactoring, "conservative" for minimal changes
  refactoring_level: "aggressive"
  
  # Whether to backup original files before processing
  backup_originals: true

# Retry Settings
retry:
  max_retries: 5
  backoff_multiplier: 15  # Base wait time in seconds (15, 30, 60...)
  file_cooldown: 60      # Seconds to wait between files to avoid rate limits

# Output Settings
output:
  log_file: "logs/codebase_agent.log"
  report_file: "reports/refactoring_report.html"
  save_diffs: true
  diffs_dir: "diffs"

# Compliance Settings
compliance:
  fail_on_severity: "high"  # one of: critical, high, medium, low, or null to disable gate
  findings_file: "reports/compliance_findings.json"
  audit_log_file: "reports/compliance_audit_log.jsonl"

# RAG (Retrieval-Augmented Generation) Settings
rag:
  enable: true  # Set to false to disable RAG
  embedding_model: "all-MiniLM-L6-v2"  # Sentence transformer model
  persist_directory: "rag_data"  # Where to store embeddings
  collection_name: "codebase"
  index_on_startup: true  # Auto-index directories on startup
  n_results: 3  # Number of relevant snippets to retrieve
  chunk_size: 500  # Characters per code chunk
  chunk_overlap: 50  # Overlap between chunks
  
  # Directories to index for RAG learning
  index_directories:
    - "target_repo"           # Your actual code to refactor
    - "synthetic_codebase"    # LLM-generated patterns for RAG to learn from
    # synthetic_codebase/compliance/ is included above and provides:
    #   - secure_transaction_service.py  (AML/KYC screening, parameterized SQL, audit trails)
    #   - audit_logging.py              (hash-chained audit logs, SOX/PCI patterns)
    #   - secrets_management.py         (env-based secrets, CWE-798 prevention)
    #   - input_validation.py           (amount/IBAN validation, PII masking)
    #   - kyc_workflow.py               (tiered KYC, PEP detection, FATF Rec 10/12)
