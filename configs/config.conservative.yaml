# Conservative refactoring config - minimal changes

llm:
  model: "groq/llama-3.3-70b-versatile"
  temperature: 0.0
  max_tokens: 4096

agents:
  analyst:
    max_iter: 1  # Less analysis
    enable: true
  developer:
    max_iter: 1  # Single pass only
    enable: true
  qa_engineer:
    max_iter: 1
    enable: true

crew:
  process: "sequential"
  memory: false
  max_rpm: 25
  verbose: false  # Quieter output

processing:
  files:
    - "target_repo/bad_code_1.py"
    - "target_repo/bad_code_2.py"
    - "target_repo/deps_shared.py"
    - "target_repo/deps_a.py"
    - "target_repo/deps_b.py"
  refactoring_level: "conservative"
  backup_originals: true

retry:
  max_retries: 5
  backoff_multiplier: 10
  file_cooldown: 10

output:
  log_file: "logs/codebase_agent_conservative.log"
  report_file: "reports/refactoring_report_conservative.html"
  save_diffs: true
  diffs_dir: "diffs"
